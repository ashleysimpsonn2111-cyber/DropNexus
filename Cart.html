<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - DropNexus</title>
  <link rel="stylesheet" href="cart.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header (reuse from homepage) -->
  <header class="header">
    <nav class="nav">
      <a href="Home.html" class="logo">DropNexus</a>
      <div class="search-bar">
        <input type="search" placeholder="Search products...">
        <button>🔍</button>
      </div>
      <div class="nav-icons">
        <span>🛒 <span class="cart-count">3</span></span>
        <span>👤</span>
      </div>
    </nav>
  </header>

  <main class="cart-page">
    <div class="container">
      <h1>Your Cart</h1>
      <div class="cart-empty" style="display: none;">Your cart is empty. <a href="Home.html">Continue Shopping</a></div>
      
      <div class="cart-items" id="cart-items">
        <!-- Cart items will be populated by JavaScript -->
      </div>

      <div class="cart-summary">
        <div class="summary-row">
          <span>Subtotal:</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping:</span>
          <span>Free</span>
        </div>
        <div class="summary-row total">
          <span>Total:</span>
          <span id="total">$0.00</span>
        </div>
        <a href="Checkout.html"><button class="checkout-btn">Proceed to Checkout</button></a>
        <a href="Home.html" class="continue-shopping">Continue Shopping</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div>DropNexus © 2026. All rights reserved.</div>
      <div>Privacy | Terms | Support</div>
    </div>
  </footer>

  <script>
    function loadCart() {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      let cartItemsContainer = document.getElementById('cart-items');
      let subtotal = 0;

      if (cart.length === 0) {
        cartItemsContainer.innerHTML = '<p>Your cart is empty. <a href="Home.html">Continue Shopping</a></p>';
        document.getElementById('subtotal').textContent = '$0.00';
        document.getElementById('total').textContent = '$0.00';
        return;
      }

      cartItemsContainer.innerHTML = '';
      cart.forEach((item, index) => {
        let itemTotal = item.price * item.quantity;
        subtotal += itemTotal;

        let cartItem = document.createElement('div');
        cartItem.className = 'cart-item';
        cartItem.innerHTML = `
          <img src="${item.image}" alt="${item.name}">
          <div class="item-details">
            <h3>${item.name}</h3>
            <p>$${item.price.toFixed(2)}</p>
          </div>
          <div class="quantity">
            <button onclick="changeQuantity(${index}, -1)">-</button>
            <span>${item.quantity}</span>
            <button onclick="changeQuantity(${index}, 1)">+</button>
          </div>
          <div class="item-total">$${itemTotal.toFixed(2)}</div>
          <button class="remove" onclick="removeItem(${index})">Remove</button>
        `;
        cartItemsContainer.appendChild(cartItem);
      });

      document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
      document.getElementById('total').textContent = '$' + subtotal.toFixed(2);
      updateCartCount();
    }

    function changeQuantity(index, delta) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      if (cart[index]) {
        cart[index].quantity += delta;
        if (cart[index].quantity <= 0) {
          cart.splice(index, 1);
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        loadCart();
      }
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
    }

    function updateCartCount() {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      let totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.querySelector('.cart-count').textContent = totalItems;
    }

    // Load cart on page load
    window.onload = loadCart;
  </script>
</body>
</html>
